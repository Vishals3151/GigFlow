version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/gigflow
      - JWT_SECRET=development_secret_key
      - JWT_EXPIRE=30d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
